name: Bug report
description: Something broken in mneo
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: One paragraph. The behavior you saw.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Minimal commands or code. Less is more.
      render: bash
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mneo version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: OS / Node / git
      placeholder: "macOS 15.3 / Node 20.11 / git 2.45"
    validations:
      required: true
